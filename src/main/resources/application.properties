# Server Configuration
server.port=8082
server.servlet.context-path=/api

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_manage_system?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=mysql123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

# JWT Configuration
jwt.secret=ThisIsAStrongSecretKeyForHS512AlgorithmAndItMustBeAtLeast64Chars!!
jwt.expirationMs=86400000

# Disease Prediction Flask API Configuration
flask.api.url=http://127.0.0.1:5000/predict

# OpenAI API Configuration
openai.api.key=${OPENAI_API_KEY:REPLACE_WITH_YOUR_KEY}
openai.api.url=https://api.openai.com/v1/chat/completions
openai.model=gpt-4o-mini
